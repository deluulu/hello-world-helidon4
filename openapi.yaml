openapi: 3.1.1
info:
  title: Profiles API
  description: CRUD API yo manage profiles.
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Local development server

paths:
  /health:
    get:
      summary: Health check
      operationId: getHealth
      responses:
        '200':
          description: Service is up
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: UP

  /profiles:
    get:
      summary: List all profiles
      operationId: getAllProfiles
      responses:
        '200':
          description: Array of profiles ordered by created_at descending
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Profile'

    post:
      summary: Create a profile
      operationId: createProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProfileRequest'
      responses:
        '201':
          description: Profile created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CountResponse'
              example:
                created: 1

  /profiles/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: Profile UUID
        schema:
          type: string
          format: uuid

    get:
      summary: Get a profile by ID
      operationId: getProfileById
      responses:
        '200':
          description: Profile found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
        '404':
          description: Profile not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      summary: Update a profile
      operationId: updateProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CountResponse'
              example:
                updated: 1
        '404':
          description: Profile not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      summary: Delete a profile
      operationId: deleteProfile
      responses:
        '200':
          description: Profile deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CountResponse'
              example:
                deleted: 1
        '404':
          description: Profile not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    Profile:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Primary key — generated by the database (gen_random_uuid())
        username:
          type: string
          nullable: true
        full_name:
          type: string
          nullable: true
        avatar_url:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true

    CreateProfileRequest:
      type: object
      properties:
        username:
          type: string
        full_name:
          type: string
        bio:
          type: string
      example:
        username: jdoe
        full_name: John Doe
        bio: Software engineer

    UpdateProfileRequest:
      type: object
      properties:
        full_name:
          type: string
        bio:
          type: string
        avatar_url:
          type: string
      example:
        full_name: John Doe
        bio: Updated bio
        avatar_url: https://example.com/avatar.png

    CountResponse:
      type: object
      properties:
        created:
          type: integer
          description: Number of rows inserted (present on POST responses)
        updated:
          type: integer
          description: Number of rows updated (present on PUT responses)
        deleted:
          type: integer
          description: Number of rows deleted (present on DELETE responses)

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: "Profile not found: 123e4567-e89b-12d3-a456-426614174000"
